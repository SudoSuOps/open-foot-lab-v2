<script type="text/x-dc" data-dc-script data-props="{&quot;accent&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#5FD38A&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Brand&quot;, &quot;options&quot;: [&quot;#A3D93B&quot;, &quot;#5FD38A&quot;, &quot;#F5B82E&quot;, &quot;#8B5CF6&quot;]}, &quot;corners&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;rounded&quot;, &quot;options&quot;: [&quot;rounded&quot;, &quot;sharp&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Brand&quot;}}">
class Component extends DCLogic {
  contentRef = React.createRef();
  tocRef = React.createRef();
  pnRef = React.createRef();

  buildToc(){
    if (!this.contentRef.current || !this.tocRef.current) return;
    const hs = this.contentRef.current.querySelectorAll('h2');
    if (!hs.length) { this.tocRef.current.innerHTML = ''; return; }
    let html = '<div class="toc-label">On this page</div>';
    hs.forEach((h, idx) => { const id = 'sec' + idx; h.id = id; html += '<a href="#' + id + '">' + h.textContent + '</a>'; });
    this.tocRef.current.innerHTML = html;
  }

  buildPrevNext(slug){
    if (!this.pnRef.current) return;
    const order = [
      ['defendable-data','The defendable data'],
      ['beyond-diabetes','Foot risk beyond diabetes'],
      ['record-you-own','Beyond diabetes, and the record you own'],
      ['medgemma','Getting the most out of MedGemma'],
      ['intelligence-layer','OpenFootLab — the intelligence layer']
    ];
    const idx = order.findIndex(o => o[0] === slug);
    const box = (href, label, title, align) => '<a href="' + href + '" style="flex:1; min-width:0; border:1px solid rgba(255,255,255,0.1); border-radius:14px; padding:18px 22px; color:#F2F4EF; text-align:' + align + ';"><div style="font-family:\'JetBrains Mono\',monospace; font-size:11px; letter-spacing:0.1em; color:#70746B; margin-bottom:7px;">' + label + '</div><div style="font-family:\'Archivo\',sans-serif; font-weight:700; font-size:16px; line-height:1.25;">' + title + '</div></a>';
    let html = '';
    html += idx > 0 ? box('OpenFootlab%20Doc.dc.html?doc=' + order[idx-1][0], '\u2190 PREVIOUS', order[idx-1][1], 'left') : '<span style="flex:1;"></span>';
    html += (idx >= 0 && idx < order.length - 1) ? box('OpenFootlab%20Doc.dc.html?doc=' + order[idx+1][0], 'NEXT \u2192', order[idx+1][1], 'right') : '<span style="flex:1;"></span>';
    this.pnRef.current.innerHTML = html;
  }

  lighten(hex, amt) {
    try {
      let h = hex.replace('#',''); if (h.length === 3) h = h.split('').map(c => c+c).join('');
      const num = parseInt(h, 16); let r=(num>>16)&255, g=(num>>8)&255, b=num&255;
      r=Math.min(255,Math.round(r+(255-r)*amt)); g=Math.min(255,Math.round(g+(255-g)*amt)); b=Math.min(255,Math.round(b+(255-b)*amt));
      return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
    } catch(e){ return hex; }
  }

  esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  inline(s){
    s = this.esc(s);
    s = s.replace(/`([^`]+)`/g,'<code>$1</code>');
    s = s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
    s = s.replace(/\*([^*]+)\*/g,'<em>$1</em>');
    s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
    s = s.replace(/(^|[^A-Za-z0-9_])_([^_]+)_(?![A-Za-z0-9])/g,'$1<em>$2</em>');
    return s;
  }

  splitRow(ln){ return ln.trim().replace(/^\|/,'').replace(/\|$/,'').split('|').map(c=>c.trim()); }

  md2html(md){
    const lines = md.replace(/\r/g,'').split('\n');
    const out = []; let i = 0;
    while (i < lines.length) {
      const ln = lines[i];
      if (/^\s*$/.test(ln)) { i++; continue; }
      if (/^---+\s*$/.test(ln)) { out.push('<hr>'); i++; continue; }
      const h = /^(#{1,4})\s+(.*)$/.exec(ln);
      if (h) { const l = h[1].length; out.push('<h'+l+'>'+this.inline(h[2])+'</h'+l+'>'); i++; continue; }
      if (/^\s*\|/.test(ln) && i+1 < lines.length && /-/.test(lines[i+1]) && /^\s*\|?[\s:|-]+$/.test(lines[i+1])) {
        const header = this.splitRow(ln); i += 2; const rows = [];
        while (i < lines.length && /^\s*\|/.test(lines[i])) { rows.push(this.splitRow(lines[i])); i++; }
        let t = '<table><thead><tr>' + header.map(c=>'<th>'+this.inline(c)+'</th>').join('') + '</tr></thead><tbody>';
        t += rows.map(r=>'<tr>'+r.map(c=>'<td>'+this.inline(c)+'</td>').join('')+'</tr>').join('');
        t += '</tbody></table>'; out.push(t); continue;
      }
      if (/^\s*>/.test(ln)) {
        const buf = [];
        while (i < lines.length && /^\s*>/.test(lines[i])) { buf.push(lines[i].replace(/^\s*>\s?/,'')); i++; }
        out.push('<blockquote>'+this.inline(buf.join(' '))+'</blockquote>'); continue;
      }
      if (/^\s*[-*]\s+/.test(ln)) {
        const buf = [];
        while (i < lines.length && /^\s*[-*]\s+/.test(lines[i])) { buf.push(lines[i].replace(/^\s*[-*]\s+/,'')); i++; }
        out.push('<ul>'+buf.map(b=>'<li>'+this.inline(b)+'</li>').join('')+'</ul>'); continue;
      }
      if (/^\s*\d+\.\s+/.test(ln)) {
        const buf = [];
        while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) { buf.push(lines[i].replace(/^\s*\d+\.\s+/,'')); i++; }
        out.push('<ol>'+buf.map(b=>'<li>'+this.inline(b)+'</li>').join('')+'</ol>'); continue;
      }
      const buf = [];
      while (i < lines.length && !/^\s*$/.test(lines[i]) && !/^(#{1,4}\s|\s*>|\s*[-*]\s|\s*\d+\.\s|\s*\|)/.test(lines[i]) && !/^---+\s*$/.test(lines[i])) { buf.push(lines[i]); i++; }
      out.push('<p>'+this.inline(buf.join(' '))+'</p>');
    }
    return out.join('\n');
  }

  componentDidMount(){
    const map = {
      'defendable-data': { file:'The-Defendable-Data.md', title:'The defendable data' },
      'beyond-diabetes': { file:'Foot-Risk-Beyond-Diabetes.md', title:'Foot risk beyond diabetes' },
      'record-you-own': { file:'Beyond-Diabetes-and-the-Record-You-Own.md', title:'Beyond diabetes, and the record you own' },
      'medgemma': { file:'Getting-the-Most-from-MedGemma.md', title:'Getting the most out of MedGemma' },
      'intelligence-layer': { file:'OpenFootLab-The-Intelligence-Layer.md', title:'OpenFootLab — the intelligence layer' }
    };
    let slug = 'defendable-data';
    try { slug = new URLSearchParams(window.location.search).get('doc') || slug; } catch(e){}
    const entry = map[slug] || map['defendable-data'];
    try { document.title = entry.title + ' — OpenFootlab Intel'; } catch(e){}
    this.buildPrevNext(slug);
    fetch('docs/' + entry.file)
      .then(r => { if (!r.ok) throw new Error('nf'); return r.text(); })
      .then(t => { if (this.contentRef.current) { this.contentRef.current.innerHTML = this.md2html(t); this.buildToc(); } })
      .catch(() => {
        if (this.contentRef.current) this.contentRef.current.innerHTML =
          '<h1>' + entry.title + '</h1><p>This document can\u2019t be loaded in this view. <a href="https://www.openfootlab.com/docs/' + entry.file + '" target="_blank" rel="noopener">Read it on openfootlab.com &rarr;</a></p>';
      });
  }

  renderVals(){
    const accent = this.props.accent ?? '#5FD38A';
    const radius = (this.props.corners ?? 'rounded') === 'sharp' ? '3px' : '14px';
    const themeVars = `--accent:${accent};--accent-bright:${this.lighten(accent,0.35)};--radius:${radius};`;
    return { themeVars, contentRef: this.contentRef, tocRef: this.tocRef, pnRef: this.pnRef };
  }
}
</script>
